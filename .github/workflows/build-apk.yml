name: Build Pocket PR APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOTENV: 1

      - name: Pin Gradle to 8.10 (RN compatible)
        run: |
          sed -i "s|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|" android/gradle/wrapper/gradle-wrapper.properties
          # Suppress deprecation warnings
          echo "org.gradle.warning.mode=none" >> android/gradle.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore pocketpr-upload.jks \
            -alias pocketpr \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass pocketpr2024! \
            -keypass pocketpr2024! \
            -dname "CN=Stacy Martin, OU=PocketPR, O=PocketPR, L=Denver, ST=CO, C=US"
          cp pocketpr-upload.jks android/app/pocketpr-upload.jks

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs {
            release {
              storeFile file("pocketpr-upload.jks")
              storePassword "pocketpr2024!"
              keyAlias "pocketpr"
              keyPassword "pocketpr2024!"
            }
          }
          android.buildTypes.release.signingConfig android.signingConfigs.release
          EOF

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-pr-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Pocket PR Build ${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

